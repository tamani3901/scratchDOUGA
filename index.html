<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Scratch Video Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{font-family:sans-serif;text-align:center;background:#222;color:#fff;padding:20px;}
.container{background:#333;padding:20px;border-radius:10px;display:inline-block;border:2px solid #4C97FF;}
canvas{border:1px solid #555;background:white;image-rendering:pixelated;margin:20px 0;}
button,select{background:#4C97FF;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;font-size:16px;margin:5px;}
button:disabled,select:disabled{background:#777;}
.warning{color:#ff6666;font-size:14px;display:none;}
</style>
</head>

<body>
<div class="container">
<h2>Scratch 動画→テキスト変換</h2>
解像度
<select id="resolution">
<option value="360">360×360</option>
<option value="180">180×180</option>
</select>
<br><br>
秒数
<select id="timeLimit">
<option value="5">5秒</option>
<option value="10">10秒</option>
<option value="15">15秒</option>
<option value="100">100秒</option>
<option value="all" selected>動画の長さ（全て）</option>
</select>
<br><br>
FPS
<select id="fpsSelect">
<option value="10">10</option>
<option value="15">15</option>
<option value="24">24</option>
</select>
<br>
<input type="file" id="upload" accept="video/*">
<br>
<canvas id="canvas"></canvas>
<br>
<button onclick="downloadZip()">ZIP保存</button>
<p id="status">動画を選択</p>
</div>

<video id="video" style="display:none"></video>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d",{willReadFrequently:true});
const video=document.getElementById("video");
const status=document.getElementById("status");

const resolutionSelect=document.getElementById("resolution");
const timeLimitSelect=document.getElementById("timeLimit");
const fpsSelect=document.getElementById("fpsSelect");

let SIZE=360;
resolutionSelect.addEventListener("change",()=>{
SIZE=Number(resolutionSelect.value);
canvas.width=SIZE;
canvas.height=SIZE;
});

canvas.width=SIZE;
canvas.height=SIZE;
let videoLoaded=false;

document.getElementById("upload").addEventListener("change",e=>{
const file=e.target.files[0];
if(!file)return;
video.src=URL.createObjectURL(file);
video.load();
video.onloadedmetadata=()=>{
videoLoaded=true;
status.innerText="動画読み込み完了";
};
});

function seekVideo(time){
return new Promise(resolve=>{
video.currentTime=time;
video.onseeked=()=>resolve();
});
}

function rgbToScratchHSV1(r,g,b){
r/=255; g/=255; b/=255;
const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
let h=0;
if(d!==0){
if(max===r)h=(g-b)/d+(g<b?6:0);
else if(max===g)h=(b-r)/d+2;
else h=(r-g)/d+4;
}
return{
h:Math.round((h/6)*100),
s:Math.round((max===0?0:d/max)*100),
v:Math.round(max*100)
};
}

async function downloadZip(){
if(!videoLoaded){alert("動画読み込んで");return;}

const zip=new JSZip();
const FPS=Number(fpsSelect.value);
let selected=timeLimitSelect.value;
let maxTime=(selected==="all")?video.duration:Math.min(Number(selected),video.duration);
const totalFrames=Math.floor(maxTime*FPS);

const scale=SIZE/video.videoWidth;
const drawHeight=Math.floor(video.videoHeight*scale);
const validHeight=Math.min(drawHeight,SIZE);

// 元のコードの「valuesPerFile」に相当する制限
const pixelsPerFrame=SIZE*validHeight;
const valuesPerFile=(pixelsPerFrame*FPS)*10; 

let frameIndex=0;
let fileIndex=0;

// パレット管理用（ファイルが変わっても維持）
let colorPalette = [];
let colorMap = new Map();

while(frameIndex<totalFrames){
    let data=[];

    // 最初のファイルにだけヘッダー情報を入れる（元の構造維持）
    if(fileIndex===0){
        data.push(FPS);
        data.push(validHeight);
        data.push(totalFrames);
    }

    let currentValues=0;
    while(frameIndex<totalFrames){
        await seekVideo(frameIndex/FPS);
        ctx.clearRect(0,0,SIZE,SIZE);
        ctx.drawImage(video,0,0,SIZE,drawHeight);
        const pixels=ctx.getImageData(0,0,SIZE,validHeight).data;

        // ①使う色のHSVを抽出
        let frameIndices = [];
        for(let p=0; p<pixels.length; p+=4){
            const hsv=rgbToScratchHSV1(pixels[p],pixels[p+1],pixels[p+2]);
            const key = `${hsv.h},${hsv.s},${hsv.v}`;
            
            if(!colorMap.has(key)){
                colorMap.set(key, colorMap.size + 1);
                colorPalette.push(hsv);
            }
            frameIndices.push(colorMap.get(key));
        }

        // ここで一旦「現時点でのパレット」を先頭に入れるか検討が必要ですが、
        // 全ファイルで共通のパレットを参照する場合、最後にまとめて出すか、
        // もしくは毎フレームのインデックスを貯める必要があります。
        // ここでは「各ファイル内」でその時までのパレット＋インデックスを出す形にします。
        
        // データの構築： [パレットのHSV...] [このフレームのインデックス...]
        // ※ご指定の「①HSVを出して②数字を出して③動画データ」の順序を守ります
        
        // ただし分割ファイルの場合、各ファイルにパレットを含めないとScratch側で番号がズレるため
        // ファイルごとに「その時点のパレット数」と「パレット本体」を先頭に付与します。
        
        let tempFileData = [];
        // パレット情報
        tempFileData.push(colorPalette.length); 
        colorPalette.forEach(c => {
            tempFileData.push(c.h);
            tempFileData.push(c.s);
            tempFileData.push(c.v);
        });
        // インデックス情報
        frameIndices.forEach(idx => tempFileData.push(idx));

        data.push(...tempFileData);
        
        currentValues += pixelsPerFrame; // カウント
        frameIndex++;
        status.innerText=`処理中 ${frameIndex}/${totalFrames}`;

        if(currentValues >= valuesPerFile) break;
    }

    zip.file(`video_${fileIndex+1}.txt`, data.join("\n"));
    data=null;
    fileIndex++;
}

status.innerText="ZIP圧縮中";
const blob=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:9}});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="scratch_video.zip";
a.click();
status.innerText="完了";
}
</script>
</body>
</html>
