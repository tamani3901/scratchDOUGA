<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Video Converter</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
}

canvas{
border:1px solid #555;
margin-top:10px;
}

button{
margin:5px;
padding:10px;
}
</style>

</head>

<body>

<h2>動画 → Scratchデータ変換</h2>

<input type="file" id="fileInput" accept="video/*">
<br>
<button id="startBtn">変換開始</button>

<br>
<canvas id="canvas"></canvas>

<script>

const SIZE = 180;
const FPS = 24;

const fileInput = document.getElementById("fileInput");
const startBtn = document.getElementById("startBtn");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = SIZE;
canvas.height = SIZE;

let video = document.createElement("video");
video.muted = true;

let frames = [];

fileInput.addEventListener("change", e=>{
const file = e.target.files[0];
if(!file) return;

video.src = URL.createObjectURL(file);
video.load();
});

startBtn.onclick = async ()=>{

frames=[];

const duration = video.duration;
const totalFrames = Math.floor(duration * FPS);

for(let i=0;i<totalFrames;i++){

video.currentTime = i / FPS;

await new Promise(resolve=>{
video.onseeked = resolve;
});

drawFrame();

const img = ctx.getImageData(0,0,SIZE,SIZE);
frames.push(img.data);

}

console.log("frames:",frames.length);
console.log("1frame pixels:",SIZE*SIZE);

};

function drawFrame(){

ctx.fillStyle="white";
ctx.fillRect(0,0,SIZE,SIZE);

let drawWidth;
let drawHeight;
let offsetX=0;
let offsetY=0;

if(video.videoWidth >= video.videoHeight){

// 横動画
const scale = SIZE / video.videoWidth;

drawWidth = SIZE;
drawHeight = Math.floor(video.videoHeight * scale);

offsetY = Math.floor((SIZE - drawHeight)/2);

}else{

// 縦動画
const scale = SIZE / video.videoHeight;

drawHeight = SIZE;
drawWidth = Math.floor(video.videoWidth * scale);

offsetX = Math.floor((SIZE - drawWidth)/2);

}

ctx.drawImage(
video,
offsetX,
offsetY,
drawWidth,
drawHeight
);

}

</script>

</body>
</html>
